 <!DOCTYPE html>
  <html lang="it">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, 
  initial-scale=1.0">
      <title>UrbanAI - Assistente Pianificazione Urbana</title>
      <style>
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
          }

          body {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe 
  UI', Roboto, sans-serif;
              background: #f7f7f8;
              color: #0d0d0d;
              overflow-x: hidden;
          }

          .header {
              background: white;
              border-bottom: 1px solid #e5e5e5;
              padding: 12px 20px;
              display: flex;
              justify-content: space-between;
              align-items: center;
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              z-index: 100;
          }

          .logo {
              font-size: 18px;
              font-weight: 600;
              color: #0d0d0d;
              display: flex;
              align-items: center;
              gap: 8px;
          }

          .status {
              display: flex;
              align-items: center;
              gap: 8px;
              padding: 6px 12px;
              background: #dcfce7;
              color: #166534;
              border-radius: 20px;
              font-size: 13px;
          }

          .main {
              display: flex;
              height: 100vh;
              padding-top: 60px;
          }

          .chat-container {
              flex: 1;
              display: flex;
              flex-direction: column;
              max-width: 800px;
              margin: 0 auto;
              padding: 0 20px;
          }

          .chat-messages {
              flex: 1;
              padding: 40px 0;
              overflow-y: auto;
          }

          .message {
              margin-bottom: 24px;
              display: flex;
              gap: 12px;
          }

          .message.user {
              flex-direction: row-reverse;
          }

          .avatar {
              width: 32px;
              height: 32px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 14px;
              font-weight: 600;
              flex-shrink: 0;
          }

          .avatar.bot {
              background: #2563eb;
              color: white;
          }

          .avatar.user {
              background: #059669;
              color: white;
          }

          .message-content {
              background: white;
              padding: 16px 20px;
              border-radius: 16px;
              border: 1px solid #e5e5e5;
              max-width: 80%;
              line-height: 1.6;
          }

          .message.user .message-content {
              background: #2563eb;
              color: white;
              border-color: #2563eb;
          }

          .input-container {
              padding: 20px 0;
              border-top: 1px solid #e5e5e5;
              background: white;
          }

          .input-wrapper {
              position: relative;
              max-width: 100%;
              background: white;
              border: 1px solid #e5e5e5;
              border-radius: 24px;
              padding: 4px;
              display: flex;
              align-items: flex-end;
          }

          .chat-input {
              flex: 1;
              border: none;
              outline: none;
              padding: 12px 16px;
              font-size: 16px;
              resize: none;
              background: transparent;
              min-height: 24px;
              font-family: inherit;
          }

          .send-btn {
              background: #2563eb;
              color: white;
              border: none;
              width: 32px;
              height: 32px;
              border-radius: 50%;
              cursor: pointer;
              display: flex;
              align-items: center;
              justify-content: center;
              margin-right: 8px;
          }

          .typing {
              display: none;
              padding: 20px;
              text-align: center;
              color: #6b7280;
          }

          .typing.show { display: block; }

          .welcome {
              text-align: center;
              padding: 60px 40px;
              color: #6b7280;
          }

          .welcome h2 {
              font-size: 28px;
              font-weight: 600;
              color: #0d0d0d;
              margin-bottom: 12px;
          }

          .welcome p {
              font-size: 16px;
              line-height: 1.6;
          }
      </style>
  </head>
  <body>
      <div class="header">
          <div class="logo">🏙️ UrbanAI</div>
          <div class="status">✅ Pronto</div>
      </div>

      <div class="main">
          <div class="chat-container">
              <div class="chat-messages" id="chatMessages">
                  <div class="welcome">
                      <h2>Benvenuto in UrbanAI</h2>
                      <p>Il tuo assistente intelligente per la
  pianificazione urbana e le normative.<br>
                      Scrivi la tua domanda qui sotto per
  iniziare!</p>
                  </div>
              </div>

              <div class="typing" id="typing">
                  UrbanAI sta scrivendo...
              </div>

              <div class="input-container">
                  <div class="input-wrapper">
                      <textarea 
                          class="chat-input" 
                          id="chatInput" 
                          placeholder="Scrivi la tua domanda sui 
  documenti urbanistici..."
                          rows="1"
                      ></textarea>
                      <button class="send-btn" id="sendBtn">↑</button>
                  </div>
              </div>
          </div>
      </div>

      <script>
          document.addEventListener('DOMContentLoaded', () => {
              const chatInput = document.getElementById('chatInput');
              const sendBtn = document.getElementById('sendBtn');
              const chatMessages =
  document.getElementById('chatMessages');
              const typing = document.getElementById('typing');

              function addMessage(content, isUser = false) {
                  const welcome = document.querySelector('.welcome');
                  if (welcome) welcome.remove();

                  const messageDiv = document.createElement('div');
                  messageDiv.className = `message ${isUser ? 'user' : 
  'bot'}`;

                  const avatar = document.createElement('div');
                  avatar.className = `avatar ${isUser ? 'user' : 
  'bot'}`;
                  avatar.textContent = isUser ? 'U' : 'AI';

                  const contentDiv = document.createElement('div');
                  contentDiv.className = 'message-content';
                  contentDiv.innerHTML = content.replace(/\n/g,
  '<br>');

                  messageDiv.appendChild(avatar);
                  messageDiv.appendChild(contentDiv);
                  chatMessages.appendChild(messageDiv);
                  chatMessages.scrollTop = chatMessages.scrollHeight;
              }

              function showTyping(show) {
                  typing.style.display = show ? 'block' : 'none';
              }

              async function sendMessage() {
                  const question = chatInput.value.trim();
                  if (!question) return;

                  chatInput.value = '';
                  addMessage(question, true);
                  showTyping(true);

                  try {
                      // Try initialize first
                      try {
                          await fetch('/api/initialize', { method:
  'POST' });
                      } catch (e) {}

                      const response = await fetch('/api/query', {
                          method: 'POST',
                          headers: { 'Content-Type':
  'application/json' },
                          body: JSON.stringify({ question })
                      });

                      const result = await response.json();
                      showTyping(false);
                      addMessage(result.answer || 'Errore nella 
  risposta');

                  } catch (error) {
                      showTyping(false);
                      addMessage('Errore: ' + error.message);
                  }
              }

              sendBtn.addEventListener('click', sendMessage);
              chatInput.addEventListener('keydown', (e) => {
                  if (e.key === 'Enter' && !e.shiftKey) {
                      e.preventDefault();
                      sendMessage();
                  }
              });
          });
      </script>
  </body>
  </html>
