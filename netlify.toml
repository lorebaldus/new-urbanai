[build]
    command = "npm run build"
    publish = "frontend"

  [functions]
    directory = "netlify/functions"

  [[redirects]]
    from = "/api/*"
    to = "/.netlify/functions/:splat"
    status = 200

  [[redirects]]
    from = "/health"
    to = "/.netlify/functions/health"
    status = 200

  [[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200
